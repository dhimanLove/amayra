    rel="stylesheet">
</head>

<body>
  <div id="root">
    <style>
      .preloader-container {
        display: flex;
        justify-content: center;
        align-items: center;
        position: fixed;
        inset: 0;
        background-color: transparent;
      }

      .preloader-box {
        position: relative;
        width: 65px;
        aspect-ratio: 1 / 1;
      }

      .preloader-span {
        position: absolute;
        border-radius: 50px;
        box-shadow: inset 0 0 0 3px #0f0f0f;
        animation: preloaderAnim 2.5s infinite;
      }

      .preloader-delay {
        animation-delay: -1.25s;
      }

      @keyframes preloaderAnim {
        0% {
          inset: 0 35px 35px 0;
        }

        12.5% {
          inset: 0 35px 0 0;
        }

        25% {
          inset: 35px 35px 0 0;
        }

        37.5% {
          inset: 35px 0 0 0;
        }

        50% {
          inset: 35px 0 0 35px;
        }

        62.5% {
          inset: 0 0 0 35px;
        }

        75% {
          inset: 0 0 35px 35px;
        }

        87.5% {
          inset: 0 0 35px 0;
        }

        100% {
          inset: 0 35px 35px 0;
        }
      }
    </style>
    <div class="preloader-container">
      <div class="preloader-box">
        <span class="preloader-span"></span>
        <span class="preloader-span preloader-delay"></span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
